name: Release

# Build the install-free skill archive, prove it works standalone, and attach
# it to the GitHub release, so the README's "download agentify.zip from the
# latest release" can never silently break. Also runnable by hand
# (workflow_dispatch) to rehearse the build without a release.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build agentify.zip
        run: bash scripts/build-zip.sh "$RUNNER_TEMP/agentify.zip"

      - name: Smoke-test the archive standalone (doctor, demo render, post-render check)
        run: |
          unzip -q "$RUNNER_TEMP/agentify.zip" -d "$RUNNER_TEMP/skill"
          node "$RUNNER_TEMP/skill/agentify/bin/agentify.mjs" doctor
          node "$RUNNER_TEMP/skill/agentify/bin/agentify.mjs" demo "$RUNNER_TEMP/demo-out"
          node "$RUNNER_TEMP/skill/agentify/bin/agentify.mjs" check "$RUNNER_TEMP/demo-out/agentify-demo.html"

      - name: Attach agentify.zip to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$RUNNER_TEMP/agentify.zip" --clobber

      - name: Upload archive as a workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: agentify.zip
          path: ${{ runner.temp }}/agentify.zip
