name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agentify/package-lock.json
      - name: Install
        working-directory: agentify
        run: npm ci
      - name: Test (validators, goldens, renderers, CLI)
        working-directory: agentify
        run: npm test

  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Reasoning eval (grader tests + case shape + seeded gallery expectations)
        run: |
          node --test eval/check.test.mjs
          node eval/check.mjs --validate
          node eval/check.mjs --seeded

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Gallery examples pass the post-render checks
        run: node scripts/check-examples.mjs
      - name: Landing-page gallery links resolve
        run: node scripts/build-site.mjs

  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Em dash lint (project style rule, no em dashes anywhere)
        run: |
          emdash="$(printf '\342\200\224')"
          # -I ignores binary files (e.g. PNGs) so their bytes cannot falsely match.
          if grep -rIn "$emdash" . --exclude-dir=.git --exclude-dir=node_modules; then
            echo "Em dashes found. Replace with commas, colons, parentheses, or separate sentences."
            exit 1
          fi
          echo "No em dashes found."

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link check (knowledge base and repo docs)
        uses: lycheeverse/lychee-action@v2
        with:
          # Runs on PRs too, so a broken link is caught before merge, not after.
          # 403/429 are anti-bot responses and 415 is a PDF host rejecting the
          # checker's request; all three mean the resource exists, so accept them.
          # Exclude our own Pages site: it deploys in a separate workflow after
          # this one, so a newly added page 404s here until that finishes.
          args: --no-progress --accept 200,203,206,301,302,403,415,429 --exclude "avnath13\.github\.io" "agentify/knowledge/**/*.md" "agentify/SKILL.md" "README.md" "CONTRIBUTING.md" "ROADMAP.md" "CHANGELOG.md" "docs/*.md"
          fail: true
